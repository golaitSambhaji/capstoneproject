apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: product
  template:
    metadata:
      labels:
        app: product
    spec:
      containers:
      - name: product
        image: samg1988/ecommerce-product:latest
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: product-service
spec:
  type: NodePort              # changed from ClusterIP
  selector:
    app: product
  ports:
    - port: 5000              # service port
      targetPort: 5000        # container port
      nodePort: 30001         # external NodePort